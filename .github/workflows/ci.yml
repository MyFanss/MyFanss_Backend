name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: my_fans_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d my_fans_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DB_HOST: 127.0.0.1
      TEST_DB_PORT: 5432
      TEST_DB_NAME: my_fans_test
      TEST_DB_USERNAME: postgres
      TEST_DB_PASSWORD: postgres
      TEST_JWT_SECRET: ci-test-jwt-secret
      TEST_JWT_EXPIRES_IN: 1h

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Unit tests
        run: npm test

      - name: E2E tests
        run: npm run test:e2e

      - name: Build
        run: npm run build

  integration-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: my_fans_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d my_fans_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DB_HOST: 127.0.0.1
      TEST_DB_PORT: 5432
      TEST_DB_NAME: my_fans_test
      TEST_DB_USERNAME: postgres
      TEST_DB_PASSWORD: postgres
      TEST_JWT_SECRET: ci-integration-jwt-secret
      TEST_JWT_EXPIRES_IN: 1h

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Integration tests (Testcontainers PostgreSQL)
        run: npm run test:integration
